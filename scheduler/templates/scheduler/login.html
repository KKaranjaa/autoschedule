<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AutoSchedule</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .title {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 14px;
            color: #777;
            margin-bottom: 25px;
        }

        .divider {
            height: 1px;
            background-color: #eee;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background-color: #f9f9f9;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #007bff;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: background-color 0.2s;
        }

        .login-btn:hover {
            background-color: #0056b3;
        }

        .messages {
            margin-top: 20px;
            font-size: 14px;
        }

        .error {
            color: #dc3545;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="title">AutoSchedule</div>
        <div class="subtitle">AI-Assisted Timetable Generation System</div>
        <div class="divider"></div>

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <input type="text" name="username" placeholder="Enter username" required autocomplete="username">
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="Enter password" required
                    autocomplete="current-password">
            </div>
            <button type="submit" class="login-btn">
                Login <span>&#10142;</span>
            </button>
        </form>

        <div style="margin-top: 25px; font-size: 14px; color: #777;">
            New student? <a href="{% url 'register' %}"
                style="color: #007bff; text-decoration: none; font-weight: 500;">Register here</a>
        </div>

        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
    </div>
</body>

</html>
